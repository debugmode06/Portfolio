<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeleaf_tech</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/plugins/odometer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<!--Start of Tawk.to Script-->
<script type="text/javascript">
var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
(function(){
var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true;
s1.src='https://embed.tawk.to/66cff7e0ea492f34bc0b3d84/1i6e60hsd';
s1.charset='UTF-8';
s1.setAttribute('crossorigin','*');
s0.parentNode.insertBefore(s1,s0);
})();
</script>
<!--End of Tawk.to Script-->
<body>

    <div class="thumbanil">
        <img src="images/01.html" alt="">
    </div>

    <!-- scrollToTop start -->
    <div class="scrollToTop" style="display: block;">
        <div class="arrowUp">
            <i class="fa-light fa-arrow-up"></i>
        </div>
        <div class="water" style="transform: translate(0px, 100%);">
            <svg viewBox="0 0 560 20" class="water_wave water_wave_back">
                <use xlink:href="#wave"></use>
            </svg>
            <svg viewBox="0 0 560 20" class="water_wave water_wave_front">
                <use xlink:href="#wave"></use>
            </svg>
        </div>
    </div>
    <!-- scrollToTop end -->

    <!-- SVG for wave animation -->
    <svg style="display: none;">
        <symbol id="wave" viewBox="0 0 560 20">
            <path d="M0 10 C 140 10, 140 10, 280 10 C 420 10, 420 10, 560 10 L 560 20 L 0 20 Z"></path>
        </symbol>
    </svg>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/plugins/animation.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Initialize scrollToTop functionality
        document.addEventListener('DOMContentLoaded', function() {
            var box = document.querySelector(".scrollToTop");
            if (box) {
                var water = box.querySelector(".water");
                var documentHeight = document.documentElement.scrollHeight - window.innerHeight;
                
                window.addEventListener('scroll', function() {
                    var scrollPosition = window.scrollY;
                    var percent = Math.min(
                        Math.floor((scrollPosition / documentHeight) * 100),
                        100
                    );
                    water.style.transform = "translate(0," + (100 - percent) + "%)";
                    
                    if (scrollPosition >= 200) {
                        box.style.display = 'block';
                    } else {
                        box.style.display = 'none';
                    }
                });
                
                // Add click event listener to scroll to top
                box.addEventListener('click', function() {
                    window.scrollTo({
                        top: 0,
                        behavior: 'smooth'
                    });
                });
            }
        });
    </script>
</body>

</html>
